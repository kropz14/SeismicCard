<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic Community Card Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0d0d0d;font-family:'Rajdhani',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
h1{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;text-align:center}
.subtitle{font-size:12px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:36px}
.workspace{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:980px}

/* FORM */
.form-panel{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:26px;width:290px;flex-shrink:0}
.form-panel h2{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:6px}
.field input[type="text"]{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color 0.2s}
.field input[type="text"]:focus{border-color:#d4a017}
.mag-selector{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-top:4px}
.mag-btn{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#555;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:7px 0;cursor:pointer;transition:all 0.15s;text-align:center}
.mag-btn:hover{color:#fff;border-color:#555}
.upload-area{width:100%;height:80px;background:#1a1a1a;border:2px dashed #2a2a2a;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s;position:relative;overflow:hidden}
.upload-area:hover{border-color:#d4a017}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upl-icon{font-size:20px;color:#333;margin-bottom:4px}
.upl-txt{font-size:10px;letter-spacing:1px;color:#444}
.photo-prev{width:100%;height:80px;object-fit:cover;border-radius:8px;display:none}
.btn-gen{width:100%;padding:12px;margin-top:4px;background:#d4a017;border:none;border-radius:8px;color:#000;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.btn-gen:hover{background:#e8b520}
.btn-dl{width:100%;padding:10px;margin-top:8px;background:transparent;border:1px solid #2a2a2a;border-radius:8px;color:#555;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-dl:hover{border-color:#d4a017;color:#d4a017}

/* CARD */
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.card-wrap>span{font-size:10px;letter-spacing:3px;color:#333;text-transform:uppercase}
#card{width:370px;height:530px;background:#e8e5e0;border-radius:20px;position:relative;overflow:hidden;flex-shrink:0}
.chev{position:absolute;left:50%;transform:translateX(-50%);clip-path:polygon(50% 100%,0% 0%,100% 0%);transition:background 0.25s}
#chev1{top:52px;width:490px;height:245px}
#chev2{top:90px;width:375px;height:185px}
#chev3{top:118px;width:278px;height:135px}
.card-white{position:absolute;bottom:0;left:0;right:0;height:318px;background:#fff;border-radius:0 0 20px 20px}
.card-header{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-top:13px;z-index:10}
.card-title-txt{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:5px;color:#3a2a4a;margin-top:6px}
.profile-wrap{position:absolute;top:112px;left:50%;transform:translateX(-50%);z-index:20;width:148px;height:148px;border-radius:50%;background:#fff;box-shadow:0 3px 20px rgba(0,0,0,0.12);overflow:hidden;display:flex;align-items:center;justify-content:center}
#profile-ph{width:100%;height:100%;background:#e0d8ea;display:flex;align-items:center;justify-content:center;font-size:42px;color:#9a8aa2}

/* PERBAIKAN DI SINI: object-fit diubah dari cover menjadi contain */
#card-photo{display:none;width:100%;height:100%;object-fit:contain;position:absolute;inset:0}

.gmic{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;z-index:5;transition:color 0.25s}
.gmic.g1{top:222px;left:10px;transform:rotate(-15deg)}
.gmic.g2{top:220px;right:10px;transform:rotate(10deg)}
.gmic.g3{top:278px;right:18px;transform:rotate(12deg)}
.gmic.g4{top:318px;left:6px;transform:rotate(-12deg)}
.card-info{position:absolute;bottom:0;left:0;right:0;height:318px;display:flex;flex-direction:column;align-items:center;padding-top:85px;z-index:15}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:#1a1a1a;margin-bottom:1px}
.card-mag{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:#7a6a90;text-transform:uppercase;margin-bottom:12px}
.card-badge-txt{border-radius:26px;padding:6px 20px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;transition:background 0.25s,color 0.25s}
.card-x{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase;margin-bottom:4px}

/* SVG Badge */
.badge-wrap{position:relative;width:90px;height:90px;margin-top:2px}
#badge-svg{width:90px;height:90px}
.badge-level{position:absolute;top:10px;left:13px;font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;z-index:2}
</style>
</head>
<body>

<h1>Card Generator</h1>
<p class="subtitle">Seismic Community</p>

<div class="workspace">
  <div class="form-panel">
    <h2>Input Data</h2>
    <div class="field">
      <label>Nama / Username</label>
      <input type="text" id="inp-name" value="KROPZ" placeholder="NAMA">
    </div>
    <div class="field">
      <label>Magnitude Level</label>
      <div class="mag-selector" id="mag-sel">
        <button class="mag-btn" data-lv="1">1</button>
        <button class="mag-btn" data-lv="2">2</button>
        <button class="mag-btn" data-lv="3">3</button>
        <button class="mag-btn" data-lv="4">4</button>
        <button class="mag-btn" data-lv="5">5</button>
        <button class="mag-btn" data-lv="6">6</button>
        <button class="mag-btn" data-lv="7">7</button>
        <button class="mag-btn" data-lv="8">8</button>
        <button class="mag-btn" data-lv="9">9</button>
      </div>
    </div>
    <div class="field">
      <label>Akun X</label>
      <input type="text" id="inp-x" value="@kropz" placeholder="@username">
    </div>
    <div class="field">
      <label>Foto Profil</label>
      <div class="upload-area" id="upl-area">
        <div class="upl-icon">⬆</div>
        <span class="upl-txt">Klik untuk upload foto</span>
        <input type="file" id="inp-photo" accept="image/*">
      </div>
      <img id="photo-prev" class="photo-prev" alt="">
    </div>
    <button class="btn-gen" onclick="generateCard()">Generate Kartu</button>
    <button class="btn-dl" onclick="downloadCard()">Download PNG</button>
  </div>

  <div class="card-wrap">
    <span>Preview Kartu</span>
    <div id="card">
      <div class="chev" id="chev1"></div>
      <div class="chev" id="chev2"></div>
      <div class="chev" id="chev3"></div>
      <div class="card-white"></div>

      <div class="card-header">
        <svg width="46" height="54" viewBox="0 0 52 60" fill="none">
          <polygon points="26,2 48,18 40,56 12,56 4,18" fill="#5a3050"/>
          <polygon points="26,2 38,18 26,28 14,18" fill="#7a4570"/>
          <polygon points="14,18 26,28 12,56 4,18" fill="#4a2040"/>
          <polygon points="38,18 48,18 40,56 26,28" fill="#6a3860"/>
          <polygon points="26,28 40,56 12,56" fill="#5a3050"/>
        </svg>
        <div class="card-title-txt">Seismic Community</div>
      </div>

      <div class="gmic g1" id="g1">gmic</div>
      <div class="gmic g2" id="g2">gmic</div>
      <div class="gmic g3" id="g3">gmic</div>
      <div class="gmic g4" id="g4">gmic</div>

      <div class="profile-wrap">
        <div id="profile-ph">👤</div>
        <img id="card-photo" src="" alt="">
      </div>

      <div class="card-info">
        <div class="card-name" id="card-name">KROPZ</div>
        <div class="card-mag" id="card-mag">MAGNITUDE 6.0</div>
        <div class="card-badge-txt" id="card-badge">MAGNITUDE IS KEY</div>
        <div class="card-x" id="card-x">@kropz</div>
        <div class="badge-wrap">
          <svg id="badge-svg" viewBox="0 0 110 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon id="b-main" points="30,8 80,8 102,30 102,80 80,102 30,102 8,80 8,30" fill="#d4a017"/>
            <polygon id="b-inner" points="33,14 77,14 96,33 96,77 77,96 33,96 14,77 14,33" fill="#e8b520"/>
            <path id="b-shield" d="M44,8 Q55,2 66,8 L66,28 Q55,36 44,28 Z" fill="#d4a017"/>
            <path id="b-shield2" d="M46,11 Q55,6 64,11 L64,26 Q55,33 46,26 Z" fill="#c09000" opacity="0.5"/>
            <path d="M28,50 Q34,40 40,50 Q46,60 52,50 Q58,40 64,50 Q70,60 76,50 Q82,40 86,46" stroke="#1a1000" stroke-width="4" stroke-linecap="round" fill="none"/>
            <path d="M28,64 Q34,54 40,64 Q46,74 52,64 Q58,54 64,64 Q70,74 76,64 Q82,54 86,60" stroke="#1a1000" stroke-width="4" stroke-linecap="round" fill="none"/>
            <line x1="55" y1="38" x2="55" y2="78" stroke="#1a1000" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
          </svg>
          <div class="badge-level" id="badge-num" style="color:#1a1000">6</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const LEVELS = [
  {main:'#e8e490',inner:'#f5f0b0',shield:'#d4d060',gmic:'#a8a020',badge:'#c8b840',btext:'#3a3000',text:'#3a3000'}, // 1 cream
  {main:'#5adcb8',inner:'#80eece',shield:'#3abca0',gmic:'#2a9878',badge:'#3ac8a8',btext:'#003828',text:'#003828'}, // 2 mint
  {main:'#18e018',inner:'#50f050',shield:'#10b810',gmic:'#0aa00a',badge:'#18cc18',btext:'#003300',text:'#003300'}, // 3 bright green
  {main:'#30f030',inner:'#70ff70',shield:'#18d018',gmic:'#10bb10',badge:'#22dd22',btext:'#003300',text:'#003300'}, // 4 neon green
  {main:'#c0e000',inner:'#deff20',shield:'#a0bc00',gmic:'#88a000',badge:'#aacc00',btext:'#222200',text:'#222200'}, // 5 lime
  {main:'#d4a017',inner:'#f0c040',shield:'#b88010',gmic:'#a07010',badge:'#d4a017',btext:'#2a1a00',text:'#2a1a00'}, // 6 yellow (default)
  {main:'#ee8800',inner:'#ffb030',shield:'#cc6600',gmic:'#bb5500',badge:'#dd7700',btext:'#2a1000',text:'#2a1000'}, // 7 orange
  {main:'#ee3300',inner:'#ff6640',shield:'#cc2200',gmic:'#bb2200',badge:'#dd3300',btext:'#2a0000',text:'#2a0000'}, // 8 red-orange
  {main:'#00aaee',inner:'#40ccff',shield:'#0088bb',gmic:'#0077aa',badge:'#009acc',btext:'#001a2a',text:'#001a2a'}, // 9 cyan
];

let curLv = 6;

function applyLevel(lv) {
  curLv = lv;
  const c = LEVELS[lv - 1];

  // Chevrons
  document.getElementById('chev1').style.background = c.main + 'bb';
  document.getElementById('chev2').style.background = c.main + '99';
  document.getElementById('chev3').style.background = c.main + '77';

  // GMIC
  ['g1','g2','g3','g4'].forEach(id => document.getElementById(id).style.color = c.gmic);

  // Badge text pill
  const bpill = document.getElementById('card-badge');
  bpill.style.background = c.badge;
  bpill.style.color = c.btext;

  // SVG Badge colors - rebuild innerHTML to force repaint
  document.getElementById('badge-svg').innerHTML = `
    <polygon points="30,8 80,8 102,30 102,80 80,102 30,102 8,80 8,30" fill="${c.main}"/>
    <polygon points="33,14 77,14 96,33 96,77 77,96 33,96 14,77 14,33" fill="${c.inner}"/>
    <path d="M44,8 Q55,2 66,8 L66,28 Q55,36 44,28 Z" fill="${c.main}"/>
    <path d="M46,11 Q55,6 64,11 L64,26 Q55,33 46,26 Z" fill="${c.shield}" opacity="0.5"/>
    <path d="M28,50 Q34,40 40,50 Q46,60 52,50 Q58,40 64,50 Q70,60 76,50 Q82,40 86,46" stroke="#1a1000" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M28,64 Q34,54 40,64 Q46,74 52,64 Q58,54 64,64 Q70,74 76,64 Q82,54 86,60" stroke="#1a1000" stroke-width="4" stroke-linecap="round" fill="none"/>
    <line x1="55" y1="38" x2="55" y2="78" stroke="#1a1000" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  `;

  // Badge number color
  document.getElementById('badge-num').style.color = c.btext;
  document.getElementById('badge-num').textContent = lv;

  // Buttons
  document.querySelectorAll('.mag-btn').forEach(btn => {
    const active = parseInt(btn.dataset.lv) === lv;
    btn.style.borderColor = active ? c.badge : '';
    btn.style.color = active ? '#fff' : '';
    btn.style.background = active ? c.main + '33' : '';
  });

  updateCard();
}

function updateCard() {
  const name = document.getElementById('inp-name').value.trim().toUpperCase() || 'NAMA';
  const x = document.getElementById('inp-x').value.trim() || '@username';
  document.getElementById('card-name').textContent = name;
  document.getElementById('card-mag').textContent = 'MAGNITUDE ' + curLv + '.0';
  document.getElementById('card-x').textContent = x;
  document.getElementById('badge-num').textContent = curLv;
}

document.querySelectorAll('.mag-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLevel(parseInt(btn.dataset.lv)));
});
document.getElementById('inp-name').addEventListener('input', updateCard);
document.getElementById('inp-x').addEventListener('input', updateCard);

document.getElementById('inp-photo').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result;
    document.getElementById('photo-prev').src = src;
    document.getElementById('photo-prev').style.display = 'block';
    document.querySelector('.upl-icon').style.display = 'none';
    document.querySelector('.upl-txt').style.display = 'none';
    document.getElementById('card-photo').src = src;
    document.getElementById('card-photo').style.display = 'block';
    document.getElementById('profile-ph').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

function generateCard() {
  updateCard();
  const c = LEVELS[curLv - 1];
  const card = document.getElementById('card');
  card.style.boxShadow = '0 0 0 3px ' + c.badge;
  setTimeout(() => card.style.boxShadow = '', 500);
}

function downloadCard() {
  updateCard();
  html2canvas(document.getElementById('card'), {
    scale: 3, useCORS: true, backgroundColor: null, logging: false
  }).then(canvas => {
    const name = document.getElementById('inp-name').value.trim().toLowerCase() || 'card';
    const a = document.createElement('a');
    a.download = 'seismic-mag' + curLv + '-' + name + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

applyLevel(6);
</script>
</body>
</html>
